<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mercería Fabio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🧵 Mercería Fabio</h1>
    <p>Estamos preparando nuestra tienda virtual.</p>
    <p>Muy pronto podrás descubrir todos nuestros productos y novedades.</p>
  </div>
</body>
</html>
